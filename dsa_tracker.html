<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Grind Tracker — Product Companies</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #888;
    --accent: #4ade80;
    --accent-dim: rgba(74,222,128,0.12);
    --med: #f59e0b;
    --med-bg: rgba(245,158,11,0.12);
    --hard: #ef4444;
    --hard-bg: rgba(239,68,68,0.12);
    --done-bg: rgba(74,222,128,0.08);
    --radius: 8px;
    --radius-lg: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 14px; line-height: 1.6; min-height: 100vh; }

  .top-bar { position: sticky; top: 0; z-index: 100; background: rgba(10,10,10,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .logo { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; white-space: nowrap; }
  .logo span { color: var(--muted); font-weight: 400; }
  .stats-row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .stat { display: flex; align-items: center; gap: 6px; font-size: 13px; }
  .stat-val { font-weight: 700; font-size: 15px; }
  .stat-val.total { color: var(--text); }
  .stat-val.done { color: var(--accent); }
  .stat-val.med { color: var(--med); }
  .stat-val.hard { color: var(--hard); }
  .stat-lbl { color: var(--muted); }
  .controls { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
  input[type=text], select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius); padding: 6px 12px; font-size: 13px; font-family: inherit; outline: none; }
  input[type=text] { width: 200px; }
  input[type=text]:focus, select:focus { border-color: var(--accent); }
  select option { background: #1a1a1a; }

  .global-progress { height: 3px; background: var(--surface2); }
  .global-progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #22d3ee); transition: width 0.4s; }

  .main { max-width: 1400px; margin: 0 auto; padding: 24px 24px 60px; }

  .topic-block { margin-bottom: 16px; border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .topic-header { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: var(--surface); cursor: pointer; user-select: none; transition: background 0.15s; }
  .topic-header:hover { background: var(--surface2); }
  .topic-icon { font-size: 18px; width: 28px; text-align: center; }
  .topic-name { font-size: 15px; font-weight: 700; color: var(--text); flex: 1; }
  .topic-count { font-size: 12px; color: var(--muted); }
  .topic-prog-wrap { display: flex; align-items: center; gap: 10px; }
  .topic-prog-bar { width: 100px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .topic-prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
  .topic-prog-text { font-size: 12px; color: var(--muted); min-width: 40px; text-align: right; }
  .chevron { color: var(--muted); font-size: 12px; transition: transform 0.2s; margin-left: 4px; }
  .chevron.open { transform: rotate(180deg); }

  .topic-body { display: none; border-top: 1px solid var(--border); }
  .topic-body.open { display: block; }

  .col-head { display: grid; grid-template-columns: 44px 1fr 90px 100px 1fr; gap: 10px; padding: 8px 18px; background: var(--bg); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 1px solid var(--border); }

  .q-row { display: grid; grid-template-columns: 44px 1fr 90px 100px 1fr; gap: 10px; padding: 10px 18px; border-bottom: 1px solid var(--border); align-items: start; transition: background 0.1s; }
  .q-row:last-child { border-bottom: none; }
  .q-row:hover { background: var(--surface2); }
  .q-row.is-done { background: var(--done-bg); }

  .q-num { color: var(--muted); font-size: 12px; padding-top: 3px; font-weight: 600; }
  .q-link { color: #60a5fa; text-decoration: none; font-size: 13px; font-weight: 500; line-height: 1.5; display: inline-flex; align-items: flex-start; gap: 4px; }
  .q-link:hover { color: #93c5fd; text-decoration: underline; }
  .q-link svg { flex-shrink: 0; margin-top: 3px; opacity: 0.6; }
  .diff { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; text-align: center; align-self: start; margin-top: 2px; letter-spacing: 0.04em; }
  .diff-M { background: var(--med-bg); color: var(--med); border: 1px solid rgba(245,158,11,0.3); }
  .diff-H { background: var(--hard-bg); color: var(--hard); border: 1px solid rgba(239,68,68,0.3); }

  .done-btn { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: inherit; transition: all 0.15s; white-space: nowrap; align-self: start; }
  .done-btn:hover { border-color: var(--accent); color: var(--accent); }
  .done-btn.done { background: var(--accent-dim); color: var(--accent); border-color: rgba(74,222,128,0.4); }

  .notes-field { font-size: 12px; padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); width: 100%; resize: none; font-family: inherit; line-height: 1.5; min-height: 30px; transition: border-color 0.15s; }
  .notes-field:focus { outline: none; border-color: rgba(74,222,128,0.4); background: var(--surface); }
  .notes-field::placeholder { color: #444; }

  .empty-msg { padding: 40px; text-align: center; color: var(--muted); font-size: 13px; }

  @media (max-width: 900px) {
    .col-head, .q-row { grid-template-columns: 36px 1fr 80px; }
    .col-head > *:nth-child(4), .col-head > *:nth-child(5),
    .q-row > *:nth-child(4), .q-row > *:nth-child(5) { display: none; }
    .controls input[type=text] { width: 140px; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo">DSA<span>.grind</span></div>
  <div class="stats-row">
    <div class="stat"><span class="stat-val total" id="s-total">0</span><span class="stat-lbl">total</span></div>

    <div class="stat"><span class="stat-val med" id="s-med">0</span><span class="stat-lbl">medium</span></div>
    <div class="stat"><span class="stat-val hard" id="s-hard">0</span><span class="stat-lbl">hard</span></div>
  </div>
  <div class="controls">
    <input type="text" id="search" placeholder="🔍 Search problems..." oninput="render()">
    <select id="diff-f" onchange="render()">
      <option value="">All difficulties</option>
      <option value="M">Medium only</option>

    <select id="topic-f" onchange="render()">

    </select>
  </div>
</div>
<div class="global-progress"><div class="global-progress-fill" id="gp" style="width:0%"></div></div>

<div class="main" id="main"></div>

  { topic:"Topological Sort", icon:"📊", qs:[
    {n:"Course Schedule",u:"https://leetcode.com/problems/course-schedule/",d:"M"},
    {n:"Course Schedule II",u:"https://leetcode.com/problems/course-schedule-ii/",d:"M"},
    {n:"Course Schedule IV",u:"https://leetcode.com/problems/course-schedule-iv/",d:"M"},
    {n:"Alien Dictionary",u:"https://leetcode.com/problems/alien-dictionary/",d:"H"},
    {n:"Sequence Reconstruction",u:"https://leetcode.com/problems/sequence-reconstruction/",d:"M"},
    {n:"Minimum Height Trees",u:"https://leetcode.com/problems/minimum-height-trees/",d:"M"},
    {n:"Find All Possible Recipes from Given Supplies",u:"https://leetcode.com/problems/find-all-possible-recipes-from-given-supplies/",d:"M"},
    {n:"Sort Items by Groups Respecting Dependencies",u:"https://leetcode.com/problems/sort-items-by-groups-respecting-dependencies/",d:"H"},
    {n:"Build a Matrix With Conditions",u:"https://leetcode.com/problems/build-a-matrix-with-conditions/",d:"H"},
    {n:"Parallel Courses",u:"https://leetcode.com/problems/parallel-courses/",d:"M"},
    {n:"Longest Increasing Path in a Matrix",u:"https://leetcode.com/problems/longest-increasing-path-in-a-matrix/",d:"H"},
    {n:"Find Eventual Safe States",u:"https://leetcode.com/problems/find-eventual-safe-states/",d:"M"},
    {n:"All Ancestors of a Node in a Directed Acyclic Graph",u:"https://leetcode.com/problems/all-ancestors-of-a-node-in-a-directed-acyclic-graph/",d:"M"},
    {n:"Largest Color Value in a Directed Graph",u:"https://leetcode.com/problems/largest-color-value-in-a-directed-graph/",d:"H"},
    {n:"Minimum Time to Complete All Tasks",u:"https://leetcode.com/problems/minimum-time-to-complete-all-tasks/",d:"H"},
    {n:"Count Ways to Build Rooms in an Ant Colony",u:"https://leetcode.com/problems/count-ways-to-build-rooms-in-an-ant-colony/",d:"H"},
    {n:"Restore the Array From Adjacent Pairs",u:"https://leetcode.com/problems/restore-the-array-from-adjacent-pairs/",d:"M"},
    {n:"Task Scheduler II",u:"https://leetcode.com/problems/task-scheduler-ii/",d:"M"},
    {n:"Longest Cycle in a Graph",u:"https://leetcode.com/problems/longest-cycle-in-a-graph/",d:"H"},
    {n:"Maximum Employees to Be Invited to a Meeting",u:"https://leetcode.com/problems/maximum-employees-to-be-invited-to-a-meeting/",d:"H"},
    {n:"Parallel Courses III",u:"https://leetcode.com/problems/parallel-courses-iii/",d:"H"},
    {n:"Number of Ways to Arrive at Destination",u:"https://leetcode.com/problems/number-of-ways-to-arrive-at-destination/",d:"M"},
    {n:"Minimum Genetic Mutation",u:"https://leetcode.com/problems/minimum-genetic-mutation/",d:"M"},
    {n:"Count Subtrees With Max Distance Between Cities",u:"https://leetcode.com/problems/count-subtrees-with-max-distance-between-cities/",d:"H"},
    {n:"Find Minimum Time to Finish All Jobs",u:"https://leetcode.com/problems/find-minimum-time-to-finish-all-jobs/",d:"H"},
    {n:"Minimum Cost to Reach Destination in Time",u:"https://leetcode.com/problems/minimum-cost-to-reach-destination-in-time/",d:"H"},
    {n:"Reconstruct Itinerary",u:"https://leetcode.com/problems/reconstruct-itinerary/",d:"H"},
    {n:"Minimum Height to Make All Nodes Reachable",u:"https://leetcode.com/problems/minimum-height-trees/",d:"M"},
    {n:"Minimum Obstacle Removal to Reach Corner",u:"https://leetcode.com/problems/minimum-obstacle-removal-to-reach-corner/",d:"H"},
    {n:"Find the Safest Path in a Grid",u:"https://leetcode.com/problems/find-the-safest-path-in-a-grid/",d:"M"},
  ]},
];

let qId = 0;
const IDX = {};
DATA.forEach(t => {
  t.qs.forEach(q => { q._id = ++qId; IDX[q._id] = {done:false, notes:""}; });
});

function save(){ try{ localStorage.setItem('dsa_v2', JSON.stringify(IDX)); }catch(e){} }
function load(){ try{ const s=localStorage.getItem('dsa_v2'); if(s){ const p=JSON.parse(s); Object.keys(p).forEach(k=>{ if(IDX[k]) Object.assign(IDX[k],p[k]); }); } }catch(e){} }
load();

function toggleDone(id) {
  IDX[id].done = !IDX[id].done; save();
  const btn = document.getElementById('db'+id);
  const row = document.getElementById('dr'+id);
  if(btn){ btn.textContent = IDX[id].done ? '✓ Done' : 'Mark done'; btn.className = 'done-btn'+(IDX[id].done?' done':''); }
  if(row){ row.className = 'q-row'+(IDX[id].done?' is-done':''); }
  updateStats(); updateTopicProgress();
}
function saveNote(id, v){ IDX[id].notes = v; save(); }

function updateStats(){
  let tot=0,done=0,med=0,hard=0;
  DATA.forEach(t=>t.qs.forEach(q=>{ tot++; if(IDX[q._id].done)done++; if(q.d==='M')med++; if(q.d==='H')hard++; }));
  document.getElementById('s-total').textContent=tot;
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-med').textContent=med;
  document.getElementById('s-hard').textContent=hard;
  document.getElementById('gp').style.width=Math.round((done/tot)*100)+'%';
}

function updateTopicProgress(){
  DATA.forEach((t,ti)=>{
    const done = t.qs.filter(q=>IDX[q._id].done).length;
    const pct = Math.round((done/t.qs.length)*100);
    const fill = document.getElementById('tpf'+ti);
    const txt = document.getElementById('tpt'+ti);
    if(fill) fill.style.width=pct+'%';
    if(txt) txt.textContent=done+'/'+t.qs.length;
  });
}

function render(){
  const search = document.getElementById('search').value.toLowerCase();
  const diff = document.getElementById('diff-f').value;
  const doneF = document.getElementById('done-f').value;
  const topicF = document.getElementById('topic-f').value;
  const main = document.getElementById('main');
  main.innerHTML = '';

  DATA.forEach((t,ti)=>{
    if(topicF && t.topic !== topicF) return;
    const filtered = t.qs.filter(q=>{
      if(diff && q.d!==diff) return false;
      if(doneF==='done' && !IDX[q._id].done) return false;
      if(doneF==='pending' && IDX[q._id].done) return false;
      if(search && !q.n.toLowerCase().includes(search)) return false;
      return true;
    });
    if(!filtered.length) return;

    const done = t.qs.filter(q=>IDX[q._id].done).length;
    const pct = Math.round((done/t.qs.length)*100);
    const block = document.createElement('div');
    block.className = 'topic-block';
    const bodyId = 'tb'+ti;
    block.innerHTML = `
      <div class="topic-header" onclick="toggleBody('${bodyId}',this)">
        <span class="topic-icon">${t.icon}</span>
        <span class="topic-name">${t.topic}</span>
        <span class="topic-count">${filtered.length} shown</span>
        <div class="topic-prog-wrap">
          <div class="topic-prog-bar"><div class="topic-prog-fill" id="tpf${ti}" style="width:${pct}%"></div></div>
          <span class="topic-prog-text" id="tpt${ti}">${done}/${t.qs.length}</span>
        </div>
        <span class="chevron">▾</span>
      </div>
      <div class="topic-body" id="${bodyId}">
        <div class="col-head"><span>#</span><span>Problem</span><span>Difficulty</span><span>Status</span><span>What I learned / Key insight</span></div>
        ${filtered.map((q,i)=>`
          <div class="q-row${IDX[q._id].done?' is-done':''}" id="dr${q._id}">
            <span class="q-num">${i+1}</span>
            <a class="q-link" href="${q.u}" target="_blank">${q.n} <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>
            <span class="diff diff-${q.d}">${q.d==='M'?'Medium':'Hard'}</span>
            <button class="done-btn${IDX[q._id].done?' done':''}" id="db${q._id}" onclick="toggleDone(${q._id})">${IDX[q._id].done?'✓ Done':'Mark done'}</button>
            <textarea class="notes-field" rows="1" placeholder="pattern / approach / trick learned..." onchange="saveNote(${q._id},this.value)">${IDX[q._id].notes}</textarea>
          </div>
        `).join('')}
      </div>
    `;
    main.appendChild(block);
  });
  updateStats();
}

function toggleBody(id, header){
  const body = document.getElementById(id);
  const chev = header.querySelector('.chevron');
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

// Populate topic filter
const tf = document.getElementById('topic-f');
DATA.forEach(t=>{ const o=document.createElement('option'); o.value=t.topic; o.textContent=t.topic; tf.appendChild(o); });

render();
</script>
</body>
